<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Weekly Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple:      #7c3aed;
      --purple-dark: #6027c8;
      --purple-soft: #ede9fe;
      --purple-mid:  #a78bfa;
      --amber:       #f59e0b;
      --amber-soft:  #fef3c7;
      --navy:        #0f172a;
      --slate:       #64748b;
      --bg:          #f5f3ff;
      --card:        #ffffff;
      --border:      #e5e0fa;
      --hover:       #faf8ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--navy);
      font-size: 15px;
      line-height: 1.5;
    }

    /* ---- HEADER ---- */
    header {
      background: var(--card);
      border-bottom: 2px solid var(--border);
      padding: 1rem 2rem;
      display: flex; align-items: center; gap: 0.75rem;
      position: sticky; top: 0; z-index: 10;
    }
    .header-logo {
      width: 38px; height: 38px; border-radius: 12px;
      background: var(--purple); display: flex; align-items: center;
      justify-content: center; font-size: 1.25rem; flex-shrink: 0;
    }
    header h1 {
      font-size: 1.35rem; font-weight: 800; color: var(--navy); letter-spacing: -.02em;
    }
    header h1 span { color: var(--purple); }

    /* ---- LAYOUT ---- */
    main { width: 100%; margin: 0; padding: 2rem 2rem; }
    section { margin-bottom: 2.5rem; }

    /* Two-column layout: filter sidebar on the left, content on the right */
    .content-layout { display: flex; align-items: flex-start; gap: 1.5rem; }
    .sidebar { flex: 0 0 240px; position: sticky; top: 90px; }
    .content-main { flex: 1; min-width: 0; }
    .content-main section:last-child { margin-bottom: 0; }

    h2 {
      font-size: 1.1rem; font-weight: 800; color: var(--navy);
      margin-bottom: 1rem; letter-spacing: -.01em;
      display: flex; align-items: center; gap: 0.5rem;
    }
    h2 .icon { font-size: 1.1rem; }

    /* ---- TODAY CARDS ---- */
    #today-heading { font-size: 1.25rem; }
    #today-grid { display: flex; flex-wrap: wrap; gap: 0.85rem; }

    .today-card {
      background: var(--card);
      border-radius: 18px;
      padding: 1rem 1.25rem;
      min-width: 190px;
      box-shadow: 0 2px 12px rgba(124,58,237,.10);
      border: 1.5px solid var(--border);
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .15s;
    }
    .today-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,58,237,.15); }
    .today-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--purple);
    }
    .today-card.oneoff::before { background: var(--amber); }

    .today-card .child {
      font-size: 0.7rem; font-weight: 800; color: var(--purple);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 0.2rem;
    }
    .today-card.oneoff .child { color: var(--amber); }
    .today-card .activity { font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 0.25rem; }
    .today-card .time { font-size: 0.8rem; color: var(--slate); font-weight: 600; }
    .today-card .note { font-size: 0.76rem; color: #94a3b8; margin-top: 0.3rem; }

    .empty { color: #a0a8c0; font-style: italic; font-size: 0.9rem; font-weight: 600; }

    /* ---- FILTER SIDEBAR ---- */
    .filter-bar {
      display: flex; flex-direction: column; align-items: stretch; gap: 1rem;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 1.25rem;
      box-shadow: 0 2px 12px rgba(124,58,237,.06);
    }
    .filter-title {
      font-size: 0.78rem; font-weight: 800; color: var(--navy);
      text-transform: uppercase; letter-spacing: .06em;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .filter-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .filter-group label {
      font-size: 0.72rem; font-weight: 800; color: var(--slate);
      text-transform: uppercase; letter-spacing: .05em; margin: 0;
    }
    .filter-group select { width: 100%; }
    .filter-bar .btn-secondary { width: 100%; }

    /* ---- TABLES ---- */
    .table-wrap { overflow-x: auto; border-radius: 18px; box-shadow: 0 2px 12px rgba(124,58,237,.08); }
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 18px; overflow: hidden; }

    th {
      background: var(--purple); color: white;
      padding: 0.8rem 1.1rem; text-align: left;
      font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em;
    }
    th:first-child { border-radius: 0; }

    td { padding: 0.75rem 1.1rem; border-bottom: 1.5px solid #f1eeff; font-size: 0.88rem; font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--hover); }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 800; letter-spacing: .03em;
      background: var(--purple-soft); color: var(--purple);
    }

    .actions button {
      border: none; cursor: pointer; border-radius: 999px;
      padding: 4px 12px; font-size: 0.78rem; font-weight: 700;
      font-family: 'Nunito', sans-serif; margin-right: 4px; transition: opacity .15s;
    }
    .actions button:hover { opacity: .8; }
    .btn-edit { background: var(--purple-soft); color: var(--purple); }
    .btn-del  { background: #fee2e2; color: #dc2626; }

    /* ---- FORM CARD ---- */
    .card {
      background: var(--card); border-radius: 20px; padding: 1.6rem;
      box-shadow: 0 2px 12px rgba(124,58,237,.08);
      border: 1.5px solid var(--border);
    }

    .tabs { display: flex; gap: 0; margin-bottom: 1.4rem; background: var(--purple-soft); border-radius: 999px; padding: 4px; }
    .tab {
      flex: 1; padding: 0.55rem 1rem; text-align: center; cursor: pointer;
      font-size: 0.88rem; font-weight: 700; border: none; background: transparent;
      color: var(--purple); border-radius: 999px; transition: all .2s;
      font-family: 'Nunito', sans-serif;
    }
    .tab.active { background: var(--purple); color: white; box-shadow: 0 2px 8px rgba(124,58,237,.3); }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .form-row { display: flex; flex-wrap: wrap; gap: 0.85rem; margin-bottom: 0.85rem; }
    .form-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }

    label { font-size: 0.76rem; font-weight: 800; color: var(--slate); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: .05em; }

    input, select, textarea {
      padding: 0.6rem 0.9rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      color: var(--navy);
      background: #faf8ff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,.12);
      background: white;
    }
    input::placeholder, textarea::placeholder { color: #c4b5fd; font-weight: 500; }
    textarea { resize: vertical; min-height: 64px; }

    .form-actions { display: flex; gap: 0.6rem; margin-top: 0.75rem; }

    .btn-primary {
      background: var(--purple); color: white; border: none;
      border-radius: 999px; padding: 0.6rem 1.8rem;
      font-size: 0.92rem; font-weight: 800; cursor: pointer;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 4px 12px rgba(124,58,237,.35);
      transition: background .2s, transform .1s, box-shadow .2s;
    }
    .btn-primary:hover { background: var(--purple-dark); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(124,58,237,.4); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--purple-soft); color: var(--purple); border: none;
      border-radius: 999px; padding: 0.6rem 1.2rem;
      font-size: 0.92rem; font-weight: 700; cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: background .2s;
    }
    .btn-secondary:hover { background: #ddd6fe; }

    #form-status { font-size: 0.88rem; font-weight: 700; margin-top: 0.7rem; padding: 0.5rem 0.8rem; border-radius: 8px; display: none; }
    #form-status.ok  { color: #065f46; background: #d1fae5; display: block; }
    #form-status.err { color: #991b1b; background: #fee2e2; display: block; }

    input.field-error, select.field-error {
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220,38,38,.12);
      background: #fff5f5;
    }
    input.field-error:focus, select.field-error:focus {
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220,38,38,.2);
    }

    @media(max-width:820px) {
      .content-layout { flex-direction: column; }
      .sidebar { flex: 1 1 auto; width: 100%; position: static; top: auto; }
    }

    @media(max-width:600px) {
      .form-row { flex-direction: column; }
      header { padding: 0.9rem 1rem; }
      main { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">🎒</div>
  <h1>Kids <span>Scheduler</span></h1>
</header>

<main>

  <!-- TWO-COLUMN: FILTER SIDEBAR + CONTENT -->
  <div class="content-layout">

    <!-- FILTERS -->
    <aside class="sidebar">
      <div class="filter-bar">
        <div class="filter-title"><span class="icon">🔍</span> Filters</div>
        <div class="filter-group">
          <label for="filter-child">Filter by child</label>
          <select id="filter-child" onchange="applyFilters()">
            <option value="">All children</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-day">Filter by day</label>
          <select id="filter-day" onchange="applyFilters()">
            <option value="">All days</option>
            <option>Saturday</option><option>Sunday</option><option>Monday</option>
            <option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option>
          </select>
        </div>
        <button class="btn-secondary" onclick="resetFilters()">Reset</button>
      </div>
    </aside>

    <div class="content-main">

      <!-- TODAY -->
      <section>
        <h2 id="today-heading"><span class="icon">☀️</span> Today's Agenda</h2>
        <div id="today-grid"><p class="empty">Loading…</p></div>
      </section>

      <!-- WEEKLY SCHEDULE TABLE -->
      <section>
        <h2><span class="icon">📅</span> Weekly Schedule</h2>
        <div class="table-wrap">
          <table id="schedule-table">
            <thead>
              <tr>
                <th>Child</th><th>Activity</th><th>Day</th>
                <th>Start</th><th>End</th><th>Notes</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="schedule-tbody"></tbody>
          </table>
        </div>
      </section>

      <!-- ONE-OFF ITEMS TABLE -->
      <section>
        <h2><span class="icon">⭐</span> One-Off Events</h2>
        <div class="table-wrap">
          <table id="oneoff-table">
            <thead>
              <tr>
                <th>Title</th><th>Child</th><th>Date</th><th>Time</th><th>Notes</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="oneoff-tbody"></tbody>
          </table>
        </div>
      </section>

      <!-- ADD / EDIT FORM -->
      <section>
        <h2 id="form-heading">Add Item</h2>
    <div class="card">
      <div class="tabs">
        <div class="tab active" data-tab="recurring" onclick="switchTab('recurring')">Recurring (Weekly)</div>
        <div class="tab" data-tab="oneoff" onclick="switchTab('oneoff')">One-Off Event</div>
      </div>

      <!-- RECURRING FORM -->
      <div class="form-panel active" id="panel-recurring">
        <input type="hidden" id="sched-edit-id" value="" />
        <div class="form-row">
          <div class="form-group">
            <label>Child Name *</label>
            <input id="sched-child" type="text" placeholder="e.g. Emma" />
          </div>
          <div class="form-group">
            <label>Activity *</label>
            <input id="sched-activity" type="text" placeholder="e.g. Soccer Practice" />
          </div>
          <div class="form-group">
            <label>Day of Week *</label>
            <select id="sched-day">
              <option value="">-- select --</option>
              <option>Saturday</option><option>Sunday</option><option>Monday</option>
              <option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Time *</label>
            <input id="sched-start" type="time" />
          </div>
          <div class="form-group">
            <label>End Time *</label>
            <input id="sched-end" type="time" />
          </div>
          <div class="form-group" style="flex:2">
            <label>Notes</label>
            <input id="sched-notes" type="text" placeholder="Optional notes" />
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="saveSchedule()">Save</button>
          <button class="btn-secondary" id="sched-clear-btn" onclick="clearScheduleForm()">Cancel</button>
        </div>
      </div>

      <!-- ONE-OFF FORM -->
      <div class="form-panel" id="panel-oneoff">
        <input type="hidden" id="oo-edit-id" value="" />
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label>Title *</label>
            <input id="oo-title" type="text" placeholder="e.g. Doctor Appointment" />
          </div>
          <div class="form-group">
            <label>Child Name</label>
            <input id="oo-child" type="text" placeholder="e.g. Emma (optional)" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date *</label>
            <input id="oo-date" type="date" />
          </div>
          <div class="form-group">
            <label>Time *</label>
            <input id="oo-time" type="time" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Notes</label>
            <textarea id="oo-notes" placeholder="Optional notes"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="saveOneOff()">Save</button>
          <button class="btn-secondary" id="oo-clear-btn" onclick="clearOneOffForm()">Cancel</button>
        </div>
      </div>

          <div id="form-status"></div>
        </div>
      </section>

    </div><!-- /.content-main -->
  </div><!-- /.content-layout -->

</main>

<script>
const DAYS_ORDER = ['Saturday','Sunday','Monday','Tuesday','Wednesday','Thursday','Friday'];

function fmt(t) {
  if (!t) return '';
  const [h, m] = t.split(':');
  const hh = parseInt(h, 10);
  return `${hh % 12 || 12}:${m} ${hh < 12 ? 'AM' : 'PM'}`;
}

// Local YYYY-MM-DD for "today" (avoids UTC off-by-one near midnight).
function todayLocal() {
  const n = new Date();
  const pad = x => String(x).padStart(2, '0');
  return `${n.getFullYear()}-${pad(n.getMonth() + 1)}-${pad(n.getDate())}`;
}

// True if the given YYYY-MM-DD + HH:MM is earlier than the current local time.
function isPastDateTime(date, time) {
  return new Date(`${date}T${time}`) < new Date();
}

// ---- TODAY ----
async function loadToday() {
  const [sched, oo] = await Promise.all([
    fetch('/api/schedule/today').then(r => r.json()),
    fetch('/api/one-off/today').then(r => r.json())
  ]);
  const all = [
    ...sched.map(x => ({ ...x, _type: 'recurring' })),
    ...oo.map(x => ({ ...x, activity: x.title, start_time: x.time, _type: 'oneoff' }))
  ].sort((a, b) => a.start_time.localeCompare(b.start_time));

  const childFilter = document.getElementById('filter-child').value.toLowerCase();
  const filtered = childFilter
    ? all.filter(x => (x.child_name || '').toLowerCase() === childFilter)
    : all;

  const today = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  document.getElementById('today-heading').textContent = `Today's Agenda — ${today}`;

  const grid = document.getElementById('today-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<p class="empty">Nothing scheduled for today.</p>';
    return;
  }
  grid.innerHTML = filtered.map(item => {
    const label = item._type === 'oneoff'
      ? (item.child_name ? `${item.child_name} · One-Off` : 'One-Off')
      : item.child_name;
    return `
    <div class="today-card ${item._type === 'oneoff' ? 'oneoff' : ''}">
      <div class="child">${label}</div>
      <div class="activity">${item.activity}</div>
      <div class="time">${fmt(item.start_time)}${item.end_time ? ' – ' + fmt(item.end_time) : ''}</div>
      ${item.notes ? `<div class="note">${item.notes}</div>` : ''}
    </div>`;
  }).join('');
}

// ---- FILTERS ----
function getFilters() {
  return {
    child: document.getElementById('filter-child').value,
    day:   document.getElementById('filter-day').value,
  };
}

function populateChildFilter() {
  const sel = document.getElementById('filter-child');
  const current = sel.value.toLowerCase();
  // De-duplicate names case-insensitively (treat "Lana" and "lana" as one),
  // keeping the first-seen casing for display.
  const byLower = new Map();
  [...scheduleData.map(r => r.child_name), ...oneoffData.map(r => r.child_name)]
    .filter(Boolean)
    .forEach(n => { const k = n.toLowerCase(); if (!byLower.has(k)) byLower.set(k, n); });
  const names = [...byLower.values()].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
  sel.innerHTML = '<option value="">All children</option>' +
    names.map(n => `<option${n.toLowerCase() === current ? ' selected' : ''}>${n}</option>`).join('');
}

function applyFilters() {
  renderSchedule();
  renderOneOff();
  loadToday();
}

function clearFilters() {
  document.getElementById('filter-child').value = '';
  document.getElementById('filter-day').value = '';
}

function resetFilters() {
  clearFilters();
  applyFilters();
}

// ---- WEEKLY SCHEDULE TABLE ----
let scheduleData = [];
async function loadSchedule() {
  scheduleData = await fetch('/api/schedule').then(r => r.json());
  scheduleData.sort((a, b) => {
    const di = DAYS_ORDER.indexOf(a.day_of_week) - DAYS_ORDER.indexOf(b.day_of_week);
    return di !== 0 ? di : a.start_time.localeCompare(b.start_time);
  });
  populateChildFilter();
  renderSchedule();
}

function renderSchedule() {
  const { child, day } = getFilters();
  const rows = scheduleData.filter(r =>
    (!child || (r.child_name || '').toLowerCase() === child.toLowerCase()) &&
    (!day || r.day_of_week === day)
  );
  const tbody = document.getElementById('schedule-tbody');
  if (rows.length === 0) {
    const msg = scheduleData.length === 0 ? 'No recurring items yet.' : 'No items match the current filters.';
    tbody.innerHTML = `<tr><td colspan="7" class="empty" style="padding:1rem">${msg}</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td><strong>${r.child_name}</strong></td>
      <td>${r.activity}</td>
      <td><span class="badge">${r.day_of_week}</span></td>
      <td>${fmt(r.start_time)}</td>
      <td>${fmt(r.end_time)}</td>
      <td>${r.notes || ''}</td>
      <td class="actions">
        <button class="btn-edit" onclick="editSchedule(${r.id})">Edit</button>
        <button class="btn-del" onclick="deleteSchedule(${r.id})">Delete</button>
      </td>
    </tr>
  `).join('');
}

// ---- ONE-OFF TABLE ----
let oneoffData = [];
async function loadOneOff() {
  oneoffData = await fetch('/api/one-off').then(r => r.json());
  populateChildFilter();
  renderOneOff();
}

function renderOneOff() {
  const { child } = getFilters();
  const rows = oneoffData.filter(r => !child || (r.child_name || '').toLowerCase() === child.toLowerCase());
  const tbody = document.getElementById('oneoff-tbody');
  if (rows.length === 0) {
    const msg = oneoffData.length === 0 ? 'No one-off events yet.' : 'No events match the current filters.';
    tbody.innerHTML = `<tr><td colspan="6" class="empty" style="padding:1rem">${msg}</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td><strong>${r.title}</strong></td>
      <td>${r.child_name || '<span style="color:#c4b5fd">—</span>'}</td>
      <td>${r.date}</td>
      <td>${fmt(r.time)}</td>
      <td>${r.notes || ''}</td>
      <td class="actions">
        <button class="btn-edit" onclick="editOneOff(${r.id})">Edit</button>
        <button class="btn-del" onclick="deleteOneOff(${r.id})">Delete</button>
      </td>
    </tr>
  `).join('');
}

// ---- TABS ----
let currentTab = 'recurring';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
  clearScheduleForm(); clearOneOffForm();
}

// ---- SCHEDULE CRUD ----
function clearScheduleForm() {
  document.getElementById('sched-edit-id').value = '';
  ['sched-child','sched-activity','sched-start','sched-end','sched-notes'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    el.classList.remove('field-error');
  });
  const day = document.getElementById('sched-day');
  day.value = '';
  day.classList.remove('field-error');
  document.getElementById('form-heading').textContent = 'Add Item';
  setStatus('');
}

function editSchedule(id) {
  const r = scheduleData.find(x => x.id === id);
  if (!r) return;
  switchTab('recurring');
  document.getElementById('sched-edit-id').value = id;
  document.getElementById('sched-child').value = r.child_name;
  document.getElementById('sched-activity').value = r.activity;
  document.getElementById('sched-day').value = r.day_of_week;
  document.getElementById('sched-start').value = r.start_time;
  document.getElementById('sched-end').value = r.end_time;
  document.getElementById('sched-notes').value = r.notes || '';
  document.getElementById('form-heading').textContent = 'Edit Item';
  document.getElementById('panel-recurring').scrollIntoView({ behavior: 'smooth' });
}

async function saveSchedule() {
  const id = document.getElementById('sched-edit-id').value;
  const fields = {
    child_name:  document.getElementById('sched-child'),
    activity:    document.getElementById('sched-activity'),
    day_of_week: document.getElementById('sched-day'),
    start_time:  document.getElementById('sched-start'),
    end_time:    document.getElementById('sched-end'),
  };
  const body = {
    child_name:  fields.child_name.value.trim(),
    activity:    fields.activity.value.trim(),
    day_of_week: fields.day_of_week.value,
    start_time:  fields.start_time.value,
    end_time:    fields.end_time.value,
    notes:       document.getElementById('sched-notes').value.trim()
  };

  const required = ['child_name','activity','day_of_week','start_time','end_time'];
  const missing = required.filter(k => !body[k]);
  if (missing.length) {
    missing.forEach(k => fields[k].classList.add('field-error'));
    fields[missing[0]].scrollIntoView({ behavior: 'smooth', block: 'center' });
    fields[missing[0]].focus();
    return setStatus('Please fill in all highlighted fields.', true);
  }

  const url = id ? `/api/schedule/${id}` : '/api/schedule';
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (!res.ok) {
    const e = await res.json();
    return setStatus(e.error || 'Error saving.', true);
  }
  setStatus(id ? 'Updated!' : 'Added!');
  clearScheduleForm();
  clearFilters();              // ensure the saved item isn't hidden by an active filter
  await loadSchedule();
  await loadOneOff();
  await loadToday();
}

async function deleteSchedule(id) {
  if (!confirm('Delete this item?')) return;
  await fetch(`/api/schedule/${id}`, { method: 'DELETE' });
  await loadSchedule();
  await loadToday();
}

// ---- ONE-OFF CRUD ----
function clearOneOffForm() {
  document.getElementById('oo-edit-id').value = '';
  ['oo-title','oo-child','oo-date','oo-time','oo-notes'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    el.classList.remove('field-error');
  });
  document.getElementById('form-heading').textContent = 'Add Item';
  setStatus('');
}

function editOneOff(id) {
  const r = oneoffData.find(x => x.id === id);
  if (!r) return;
  switchTab('oneoff');
  document.getElementById('oo-edit-id').value = id;
  document.getElementById('oo-title').value = r.title;
  document.getElementById('oo-child').value = r.child_name || '';
  document.getElementById('oo-date').value = r.date;
  document.getElementById('oo-time').value = r.time;
  document.getElementById('oo-notes').value = r.notes || '';
  document.getElementById('form-heading').textContent = 'Edit Item';
  document.getElementById('panel-oneoff').scrollIntoView({ behavior: 'smooth' });
}

async function saveOneOff() {
  const id = document.getElementById('oo-edit-id').value;
  const fields = {
    title: document.getElementById('oo-title'),
    date:  document.getElementById('oo-date'),
    time:  document.getElementById('oo-time'),
  };
  const body = {
    title: fields.title.value.trim(),
    child_name: document.getElementById('oo-child').value.trim(),
    date:  fields.date.value,
    time:  fields.time.value,
    notes: document.getElementById('oo-notes').value.trim()
  };

  const required = ['title','date','time'];
  const missing = required.filter(k => !body[k]);
  if (missing.length) {
    missing.forEach(k => fields[k].classList.add('field-error'));
    fields[missing[0]].scrollIntoView({ behavior: 'smooth', block: 'center' });
    fields[missing[0]].focus();
    return setStatus('Please fill in all highlighted fields.', true);
  }

  // Don't allow creating a new event in the past (editing an existing one is fine).
  if (!id && isPastDateTime(body.date, body.time)) {
    fields.date.classList.add('field-error');
    fields.time.classList.add('field-error');
    fields.date.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return setStatus('That date and time are in the past — pick a future time.', true);
  }

  const url = id ? `/api/one-off/${id}` : '/api/one-off';
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (!res.ok) {
    const e = await res.json();
    return setStatus(e.error || 'Error saving.', true);
  }
  setStatus(id ? 'Updated!' : 'Added!');
  clearOneOffForm();
  clearFilters();              // ensure the saved item isn't hidden by an active filter
  await loadOneOff();
  await loadSchedule();
  await loadToday();
}

async function deleteOneOff(id) {
  if (!confirm('Delete this event?')) return;
  await fetch(`/api/one-off/${id}`, { method: 'DELETE' });
  await loadOneOff();
  await loadToday();
}

function setStatus(msg, isErr = false) {
  const el = document.getElementById('form-status');
  el.textContent = msg;
  el.className = msg ? (isErr ? 'err' : 'ok') : '';
}

// Clear field-error highlight as soon as the user starts correcting a field
['sched-child','sched-activity','sched-day','sched-start','sched-end',
 'oo-title','oo-date','oo-time'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    this.classList.remove('field-error');
  });
  document.getElementById(id).addEventListener('change', function() {
    this.classList.remove('field-error');
  });
});

// ---- INIT ----
if (location.protocol === 'file:') {
  // Opened by double-clicking the file — there is no backend to talk to.
  showServerWarning(
    'This page was opened directly from a file, so it can\'t reach the database. ' +
    'Open <strong>http://localhost:3000</strong> in your browser instead (make sure the server is running with <code>npm start</code>).'
  );
} else {
  init();
}

async function init() {
  // Stop the date picker from offering past days for new events.
  document.getElementById('oo-date').min = todayLocal();
  try {
    await Promise.all([loadToday(), loadSchedule(), loadOneOff()]);
  } catch (e) {
    showServerWarning(
      'Could not reach the server. Make sure it\'s running with <code>npm start</code>, then reload <strong>http://localhost:3000</strong>.'
    );
  }
}

function showServerWarning(html) {
  const banner = document.createElement('div');
  banner.style.cssText =
    'background:#fee2e2;color:#991b1b;border:1.5px solid #fca5a5;border-radius:12px;' +
    'padding:1rem 1.25rem;margin:0 0 1.5rem;font-weight:600;line-height:1.5;';
  banner.innerHTML = '⚠️ ' + html;
  const main = document.querySelector('main');
  main.insertBefore(banner, main.firstChild);
}
</script>
